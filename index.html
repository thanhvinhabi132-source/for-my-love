<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim Trắng Ngọc Gửi Người Thương</title>
    <!-- Nhúng Google Fonts hỗ trợ tiếng Việt hoàn hảo, không lỗi dấu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Nền đen tuyền */
            font-family: 'Comfortaa', cursive, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 520px; /* Thu hẹp khung chứa để kéo 4 tim nhỏ sát lại */
            height: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Trái Tim To Trắng Ngọc (Thu bé lại thon gọn 380px) --- */
        .big-heart {
            position: absolute;
            width: 380px; 
            height: auto;
            opacity: 0.95;
            cursor: pointer;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
            z-index: 1;
            transition: all 0.3s ease;
        }

        .big-heart:hover {
            transform: scale(1.03);
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.65));
        }

        /* --- 4 Trái Tim Ảnh (Gần lại ôm khít tim trắng) --- */
        .heart-photo {
            position: absolute;
            width: 100px; 
            height: 100px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.25));
            z-index: 2;
        }

        .heart-photo:hover {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.5));
            z-index: 3;
        }

        /* Tọa độ căn chỉnh ôm sát vào 4 góc vòng cung của tim trắng */
        .top-left { top: 45px; left: 45px; }
        .top-right { top: 45px; right: 45px; }
        .bottom-left { bottom: 45px; left: 45px; }
        .bottom-right { bottom: 45px; right: 45px; }

        .heart-shape {
            fill: #f5f5f7; /* Màu trắng ngọc */
        }

        /* --- POPUP MẢNH GIẤY THƯ TAY --- */
        .paper-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Làm mờ nền đen đằng sau sâu hơn */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .paper-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Thiết kế mảnh giấy vintage cao cấp */
        .paper {
            background-color: #fdf6e2; 
            width: 460px;
            min-height: 280px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(0,0,0,0.06);
            position: relative;
            transform: translateY(30px) rotate(-1deg);
            transition: transform 0.4s ease;
            border: 1px solid #e3dac1;
            
            /* Dòng kẻ viết thư */
            background-image: linear-gradient(#dfd6bc 1px, transparent 1px);
            background-size: 100% 36px; 
            line-height: 36px;
        }

        .paper-overlay.active .paper {
            transform: translateY(0) rotate(1deg);
        }

        /* Font chữ viết tay lãng mạn Việt Hóa 100% không lỗi dấu */
        .paper-content {
            font-family: 'Dancing Script', cursive;
            font-size: 26px; /* Font này cỡ lớn chút nhìn sẽ rất đẹp */
            color: #3d3121;
            white-space: pre-line;
            margin-top: 10px;
            padding-bottom: 30px;
        }

        /* Nút đóng mảnh giấy */
        .close-btn {
            position: absolute;
            bottom: 20px;
            right: 25px;
            background: none;
            border: none;
            font-family: 'Comfortaa', sans-serif;
            font-size: 13px;
            color: #8c765c;
            cursor: pointer;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: #ff4d6d;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <!-- --- TRÁI TIM GIỮA (Click vào đây để mở thư) --- -->
        <svg class="big-heart" id="mainHeart" viewBox="0 0 100 90">
            <path class="heart-shape" d="M92.71,7.279c-9.707-9.706-25.443-9.706-35.151,0L50,14.839l-7.559-7.56c-9.707-9.706-25.443-9.706-35.151,0c-9.707,9.707-9.707,25.444,0,35.151L50,89.96l42.71-47.53C102.417,32.723,102.417,16.986,92.71,7.279z"/>
        </svg>

        <!-- --- 4 TRÁI TIM ẢNH XUNG QUANH --- -->
        <svg class="heart-photo top-left" viewBox="0 0 100 90">
            <defs>
                <clipPath id="clipHeart1"><path d="M92.71,7.279c-9.707-9.706-25.443-9.706-35.151,0L50,14.839l-7.559-7.56c-9.707-9.706-25.443-9.706-35.151,0c-9.707,9.707-9.707,25.444,0,35.151L50,89.96l42.71-47.53C102.417,32.723,102.417,16.986,92.71,7.279z"/></clipPath>
            </defs>
            <image href="anh1.jpg" x="0" y="0" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipHeart1)"/>
        </svg>

        <svg class="heart-photo top-right" viewBox="0 0 100 90">
            <defs>
                <clipPath id="clipHeart2"><path d="M92.71,7.279c-9.707-9.706-25.443-9.706-35.151,0L50,14.839l-7.559-7.56c-9.707-9.706-25.443-9.706-35.151,0c-9.707,9.707-9.707,25.444,0,35.151L50,89.96l42.71-47.53C102.417,32.723,102.417,16.986,92.71,7.279z"/></clipPath>
            </defs>
            <image href="anh2.jpg" x="0" y="0" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipHeart2)"/>
        </svg>

        <svg class="heart-photo bottom-left" viewBox="0 0 100 90">
            <defs>
                <clipPath id="clipHeart3"><path d="M92.71,7.279c-9.707-9.706-25.443-9.706-35.151,0L50,14.839l-7.559-7.56c-9.707-9.706-25.443-9.706-35.151,0c-9.707,9.707-9.707,25.444,0,35.151L50,89.96l42.71-47.53C102.417,32.723,102.417,16.986,92.71,7.279z"/></clipPath>
            </defs>
            <image href="anh3.jpg" x="0" y="0" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipHeart3)"/>
        </svg>

        <svg class="heart-photo bottom-right" viewBox="0 0 100 90">
            <defs>
                <clipPath id="clipHeart4"><path d="M92.71,7.279c-9.707-9.706-25.443-9.706-35.151,0L50,14.839l-7.559-7.56c-9.707-9.706-25.443-9.706-35.151,0c-9.707,9.707-9.707,25.444,0,35.151L50,89.96l42.71-47.53C102.417,32.723,102.417,16.986,92.71,7.279z"/></clipPath>
            </defs>
            <image href="anh4.jpg" x="0" y="0" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipHeart4)"/>
        </svg>

    </div>

    <!-- --- MẢNH GIẤY VIẾT THƯ --- -->
    <div class="paper-overlay" id="paperOverlay">
        <div class="paper">
            <div class="paper-content">
                Dear em bé của anh,

                Gặp được em là điều tuyệt vời nhất đối với anh. Cảm ơn em đã luôn ở bên cạnh, cùng anh chia sẻ mọi niềm vui nỗi buồn. 

                Yêu em rất nhiều! ❤️
            </div>
            <button class="close-btn" id="closeBtn">Gấp lại x</button>
        </div>
    </div>

    <!-- --- HIỆU ỨNG TƯƠNG TÁC JS --- -->
    <script>
        const mainHeart = document.getElementById('mainHeart');
        const paperOverlay = document.getElementById('paperOverlay');
        const closeBtn = document.getElementById('closeBtn');

        // Mở thư
        mainHeart.addEventListener('click', () => {
            paperOverlay.classList.add('active');
        });

        // Đóng thư
        closeBtn.addEventListener('click', () => {
            paperOverlay.classList.remove('active');
        });

        // Click ra ngoài khoảng trống cũng đóng được thư
        paperOverlay.addEventListener('click', (e) => {
            if (e.target === paperOverlay) {
                paperOverlay.classList.remove('active');
            }
        });
    </script>

</body>
</html>
